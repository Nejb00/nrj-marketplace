<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="NRJ Marketplace International - Importation de produits depuis la Chine, la France et la Turquie vers le Congo Brazzaville.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <title>NRJ Marketplace International • Import Chine, France, Turquie → Congo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --surface-light: #252525;
            --primary: #f97316;
            --primary-dark: #ea580c;
            --whatsapp: #25D366;
            --whatsapp-dark: #1da851;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --border: #2a2a2a;
            --radius: 16px;
            --radius-sm: 12px;
            --transition: 0.2s ease;
            --nav-height: 64px;
            --bottom-bar-height: 70px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', 'Poppins', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: var(--nav-height);
        }

        /* ===== HEADER ===== */
        header {
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-wrapper { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; text-decoration: none; }
        .logo-icon { font-size: 1.8rem; }
        .logo-text { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; color: var(--text); }
        .logo-text span { color: var(--primary); }
        .logo-sub { font-size: 0.6rem; font-weight: 600; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }
        .header-actions { display: flex; align-items: center; gap: 0.6rem; }
        .icon-btn {
            background: var(--surface-light); border: 1px solid var(--border); border-radius: 50px;
            padding: 0.5rem 0.9rem; cursor: pointer; font-size: 0.9rem; font-weight: 600;
            color: var(--text); display: flex; align-items: center; gap: 0.3rem; transition: var(--transition);
        }
        .icon-btn:hover { background: #333; }
        .cart-count { background: var(--primary); color: white; border-radius: 40px; padding: 0.1rem 0.5rem; font-size: 0.7rem; font-weight: 700; }
        .admin-icon-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-secondary); transition: 0.2s; }
        .admin-icon-btn:hover { color: var(--primary); }
        .logout-btn {
            background: #3b1111; color: #fca5a5; border: 1px solid #5c1a1a; border-radius: 50px;
            padding: 0.4rem 0.9rem; cursor: pointer; font-size: 0.75rem; font-weight: 600;
            display: none; align-items: center; gap: 0.3rem;
        }
        .logout-btn.visible { display: flex; }

        /* ===== BARRE DE RECHERCHE ===== */
        .search-bar-container { padding: 0.6rem 1rem; background: transparent; }
        .search-bar {
            display: flex; align-items: center; background: var(--surface); border-radius: 50px;
            border: 1px solid var(--border); padding: 0.5rem 1rem; transition: var(--transition);
        }
        .search-bar:focus-within { border-color: var(--primary); }
        .search-icon { font-size: 1.1rem; margin-right: 0.5rem; color: var(--text-secondary); }
        .search-bar input {
            border: none; outline: none; font-size: 0.9rem; width: 100%;
            background: transparent; font-family: inherit; color: var(--text);
        }
        .search-bar input::placeholder { color: #666; }

        /* ===== FILTRES ===== */
        .filter-bar { display: flex; gap: 0.4rem; padding: 0.6rem 1rem; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn {
            background: var(--surface); border: 1px solid var(--border); padding: 0.4rem 1rem;
            border-radius: 50px; font-weight: 500; font-size: 0.8rem; cursor: pointer;
            color: var(--text-secondary); transition: var(--transition);
        }
        .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        .filter-btn:hover:not(.active) { border-color: #555; }
        .fav-btn.filter-btn { background: var(--surface); color: var(--text-secondary); }
        .fav-btn.filter-btn.active { background: #ef4444; color: white; border-color: #ef4444; }

        /* ===== GRILLE PRODUITS ===== */
        .products-section { padding: 0.5rem 0.8rem 1rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
        @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }
        .product-card {
            position: relative; border-radius: var(--radius); overflow: hidden;
            aspect-ratio: 3 / 4; cursor: pointer; transition: var(--transition); background: #1a1a1a;
        }
        .product-card:hover { transform: scale(1.02); }
        .product-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
        .product-card-info {
            position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
            display: flex; align-items: flex-end; padding: 0.7rem; pointer-events: none;
        }
        .product-card-text { flex: 1; min-width: 0; }
        .product-card-name { font-size: 0.8rem; font-weight: 600; color: #fff; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.2rem; }
        .product-card-price { font-size: 0.95rem; font-weight: 800; color: #fff; }
        .product-card-add {
            position: absolute; bottom: 0.7rem; right: 0.7rem;
            background: var(--primary); color: white; border: none; width: 34px; height: 34px;
            border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: var(--transition); box-shadow: 0 2px 8px rgba(249,115,22,0.4);
            background: linear-gradient(135deg, #ff7b2c, #f97316); z-index: 2;
        }
        .product-card-add:hover { transform: scale(1.1); }
        .fav-icon {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border-radius: 50%;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1rem; z-index: 5; transition: transform 0.2s;
            border: none; color: white;
        }
        .fav-icon:hover { transform: scale(1.15); }

        /* ===== MODALE PRODUIT ===== */
        .product-modal {
            position: fixed; inset: 0; z-index: 400;
            background: var(--bg);
            display: none; flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .product-modal.open { display: flex; }

        .modal-image-section {
            position: relative;
            width: 100%;
            height: 350px; /* Hauteur fixe sur mobile */
            background: #1a1a1a;
            overflow: hidden;
            flex-shrink: 0; /* 🔥 CRITIQUE : Empêche l'image de se faire écraser ou de disparaître */
        }
        .carousel-scroll {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; height: 100%;
        }
        .carousel-scroll::-webkit-scrollbar { display: none; }
        .carousel-slide { flex: 0 0 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-emoji-slide { font-size: 5rem; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

        .back-arrow-btn {
            position: absolute; top: 16px; left: 16px; z-index: 20;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-size: 1.4rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.2s; line-height: 1;
        }
        .back-arrow-btn:hover { background: rgba(0,0,0,0.7); }

        .product-id-badge {
            position: absolute; top: 16px; left: 64px; z-index: 10;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); border-radius: 20px;
            padding: 0.2rem 0.8rem; font-size: 0.7rem; color: #ddd;
        }
        .product-actions-overlay {
            position: absolute; top: 16px; right: 16px; z-index: 10; display: flex; gap: 0.5rem;
        }
        .action-circle {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.2rem; transition: background 0.2s;
        }
        .action-circle:hover { background: rgba(0,0,0,0.7); }
        .carousel-dots { display: flex; justify-content: center; gap: 6px; position: absolute; bottom: 12px; left: 0; right: 0; }
        .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); border: none; cursor: pointer; }
        .carousel-dot.active { background: var(--primary); }

        .product-details { padding: 1rem 1rem 0; }
        .product-detail-price { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 0.3rem; }
        .product-detail-moq { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.2rem; font-weight: 500; }
        .product-detail-total { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; }
        .product-detail-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; }
        .option-group { margin-bottom: 1rem; }
        .option-group label { font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 0.3rem; color: var(--text); }
        .option-buttons { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .option-btn {
            background: var(--surface); border: 2px solid var(--border); border-radius: 20px;
            padding: 0.4rem 0.9rem; font-size: 0.8rem; font-weight: 500; cursor: pointer;
            transition: 0.2s; color: var(--text);
        }
        .option-btn.selected { border-color: var(--primary); background: #2a1a0a; color: var(--primary); font-weight: 700; }

        /* Barre sticky (visible UNIQUEMENT quand la modale est ouverte) */
        .sticky-bottom-bar {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0;
            height: var(--bottom-bar-height); 
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border); 
            display: flex; 
            align-items: center;
            padding: 0.5rem 1rem; 
            z-index: 450; 
            gap: 0.8rem;
            opacity: 0; 
            pointer-events: none; 
            transform: translateY(100px); 
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .sticky-bottom-bar.visible { 
            opacity: 1; 
            pointer-events: auto; 
            transform: translateY(0); 
        }
        .btn-direct-sticky {
            flex: 3; background: linear-gradient(135deg, #25D366, #1da851);
            box-shadow: 0 8px 24px rgba(37,211,102,0.25);
            border: none; border-radius: 50px; padding: 0.8rem;
            font-weight: 700; font-size: 1rem; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            transition: var(--transition);
        }
        .btn-direct-sticky:hover { filter: brightness(1.1); }
        .btn-cart-sticky {
            flex: 1; background: linear-gradient(135deg, #ff7b2c, #f97316);
            box-shadow: 0 8px 24px rgba(249,115,22,0.3);
            border: none; border-radius: 50px; padding: 0.8rem;
            font-weight: 700; font-size: 1.5rem; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .btn-cart-sticky:hover { filter: brightness(1.1); }

        .recommendations { padding: 1rem 0; background: var(--bg); border-top: 1px solid var(--border); }
        .recommendations h3 { font-size: 1.1rem; margin-left: 1rem; margin-bottom: 0.8rem; color: var(--text); }
        .rec-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; gap: 0.6rem; padding: 0 1rem; }
        .rec-carousel::-webkit-scrollbar { display: none; }
        .rec-card {
            flex: 0 0 45%; scroll-snap-align: start;
            background: var(--surface-light); border-radius: var(--radius); overflow: hidden;
            cursor: pointer; transition: var(--transition); aspect-ratio: 1/1; position: relative;
        }
        @media (min-width: 768px) { .rec-card { flex: 0 0 22%; } }
        .rec-card img { width: 100%; height: 100%; object-fit: cover; }
        .rec-card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
            display: flex; align-items: flex-end; padding: 0.5rem;
        }
        .rec-card-name { font-size: 0.75rem; font-weight: 600; color: #fff; }
        .rec-card-price { font-size: 0.85rem; font-weight: 700; color: var(--primary); }

        .sourcing-section { padding: 1.5rem 1rem; background: var(--surface); border-top: 1px solid var(--border); text-align: center; }
        .sourcing-section h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }
        .sourcing-section p { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem; }
        .sourcing-btn { background: var(--primary); color: white; border: none; padding: 0.8rem 1.8rem; border-radius: 50px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .whatsapp-btn { background: var(--whatsapp); color: white; border: none; padding: 0.8rem 1.8rem; border-radius: 50px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }

        /* Bottom nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-height);
            background: rgba(10,10,10,0.85); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px); border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-around;
            z-index: 150; padding: 0 0.5rem;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
            cursor: pointer; color: var(--text-secondary); font-size: 0.65rem;
            font-weight: 500; transition: color 0.2s; background: none; border: none;
            padding: 0.3rem 0.5rem;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item-icon { font-size: 1.3rem; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 1rem; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 420px; padding: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--text); }

        /* Panier */
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .cart-overlay.open { opacity: 1; pointer-events: auto; }
        .cart-panel { position: fixed; top: 0; right: 0; width: 100%; max-width: 400px; height: 100vh; background: var(--surface); z-index: 201; transform: translateX(100%); transition: transform 0.25s ease-out; display: flex; flex-direction: column; }
        .cart-panel.open { transform: translateX(0); }
        .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem; font-weight: 700; border-bottom: 1px solid var(--border); }
        .cart-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); }
        .cart-items { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem; }
        .cart-empty { text-align: center; color: var(--text-secondary); padding: 3rem 0; font-size: 0.9rem; }
        .cart-item { display: flex; gap: 0.6rem; align-items: center; background: var(--surface-light); border-radius: var(--radius-sm); padding: 0.5rem; border: 1px solid var(--border); }
        .cart-item-img { width: 50px; height: 50px; border-radius: 8px; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #333; }
        .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-info h4 { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cart-item-variants { font-size: 0.7rem; color: var(--text-secondary); }
        .cart-item-price { font-weight: 700; color: var(--primary); font-size: 0.85rem; }
        .cart-item-qty { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.2rem; }
        .qty-btn { background: #444; border: none; width: 24px; height: 24px; border-radius: 50%; font-weight: 700; cursor: pointer; color: white; }
        .qty-btn:disabled { opacity: 0.4; }
        .remove-item-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-secondary); }
        .cart-footer { padding: 1rem; border-top: 1px solid var(--border); }
        .cart-total { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 1rem; }
        .checkout-btn { width: 100%; background: var(--whatsapp); color: white; border: none; padding: 0.8rem; border-radius: 50px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 0.4rem; color: var(--text); }
        .form-group input, .form-group textarea { width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--border); border-radius: 40px; font-family: inherit; font-size: 0.9rem; background: var(--surface-light); color: var(--text); transition: var(--transition); }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }

        .admin-panel { display: none; padding: 1.5rem; max-width: 600px; margin: 1.5rem auto; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
        .admin-panel.active { display: block; }
        .admin-products-list { list-style: none; margin-top: 1rem; }
        .admin-products-list li { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem; background: var(--surface-light); border-radius: 12px; margin-bottom: 0.5rem; font-size: 0.85rem; border: 1px solid var(--border); }
        .btn-sm { background: #ef4444; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; font-weight: 600; }

        .toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #fff; color: #000; padding: 0.6rem 1.5rem; border-radius: 50px; font-size: 0.85rem; font-weight: 600; z-index: 999; transition: transform 0.2s ease-out; }
        .toast.show { transform: translateX(-50%) translateY(0); }

        footer { text-align: center; padding: 1.5rem 1rem 5rem; color: #666; font-size: 0.75rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo-wrapper" onclick="location.href='/'">
            <span class="logo-icon">⚡</span>
            <div>
                <div class="logo-text">NRJ</div>
                <div class="logo-sub">Marketplace International</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="admin-icon-btn" id="adminTrigger" title="Administration">⚙️</button>
            <button class="logout-btn" id="logoutBtn" title="Se déconnecter">🚪</button>
            <button class="icon-btn" id="cartToggleBtn">🛒 <span class="cart-count" id="cartCount">0</span></button>
        </div>
    </header>

    <div id="catalogueView">
        <div class="search-bar-container">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Rechercher un produit ou un ID..." autocomplete="off">
            </div>
        </div>
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-category="all">Tout voir</button>
            <button class="filter-btn fav-btn" data-category="favorites">❤️ Favoris</button>
        </div>
        <section class="products-section">
            <div class="products-grid" id="productsGrid"></div>
        </section>
        <div id="loadMoreSentinel" style="height: 20px;"></div>
        <p id="loadingMessage" style="text-align:center;color:var(--text-secondary);display:none;">⏳ Chargement des produits...</p>
    </div>

    <div class="product-modal" id="productModal">
        <div class="modal-image-section">
            <div class="carousel-scroll" id="modalCarouselScroll"></div>
            <button class="back-arrow-btn" id="modalCloseBtn">←</button>
            <div class="product-id-badge" id="modalProductIdBadge">[ID: ...]</div>
            <div class="product-actions-overlay">
                <button class="action-circle" id="modalFavBtn">🤍</button>
                <button class="action-circle" id="modalShareBtn">↗</button>
            </div>
            <div class="carousel-dots" id="modalCarouselDots"></div>
        </div>
        <div class="product-details">
            <div class="product-detail-price" id="modalPrice"></div>
            <div class="product-detail-moq" id="modalMoq"></div>
            <div class="product-detail-total" id="modalTotal"></div>
            <div class="product-detail-desc" id="modalDesc"></div>
            <div class="option-group" id="modalTailleGroup" style="display:none;"><label>Taille</label><div class="option-buttons" id="modalTailleOptions"></div></div>
            <div class="option-group" id="modalCouleurGroup" style="display:none;"><label>Couleur</label><div class="option-buttons" id="modalCouleurOptions"></div></div>
        </div>
        <div class="recommendations">
            <h3>Vous aimerez aussi</h3>
            <div class="rec-carousel" id="modalRecCarousel"></div>
        </div>
        <div class="sourcing-section">
            <h3>🔍 Vous ne trouvez pas votre bonheur ?</h3>
            <p>Envoyez-nous une photo ou décrivez votre recherche.</p>
            <button class="sourcing-btn" id="modalSourcingBtn">📸 Photo</button>
            <input type="file" id="modalSourcingFileInput" accept="image/*" style="display:none;">
            <button class="whatsapp-btn" id="modalDescSourcingBtn" style="margin-left:0.5rem;">💬 Message</button>
            <p id="modalSourcingStatus" style="margin-top:0.8rem;font-size:0.85rem;color:var(--text-secondary);"></p>
        </div>
    </div>

    <div class="sticky-bottom-bar" id="stickyBottomBar">
        <button class="btn-direct-sticky" id="directOrderStickyBtn">⚡ Commander directement</button>
        <button class="btn-cart-sticky" id="addToCartStickyBtn">🛒</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://peojyqliwrtghomyukwn.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_Fy-Q_BAginf2p6UdUtxDMA_V1hP8Slt';
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const BASE_URL = 'https://nejb00.github.io/nrj-marketplace/';
            const WHATSAPP_NUMBER = '242066271882';
            const PRODUCTS_PER_PAGE = 20;

            function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
            function formatPrice(a){return 'XAF '+a.toLocaleString('fr-FR');}
            function removeEmojis(s){return s.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{2300}-\u{23FF}\u{2B50}\u{2B55}\u{2934}\u{2935}\u{25AA}\u{25AB}\u{25FE}\u{25FD}\u{25FB}\u{25FC}\u{25B6}\u{25C0}\u{3030}\u{303D}\u{3297}\u{3299}\u{FE0F}\u{200D}]/gu,'').trim();}

            let products=[],cart=JSON.parse(localStorage.getItem('nrj_cart_v31')||'[]'),favorites=JSON.parse(localStorage.getItem('nrj_favorites')||'[]'),currentFilter='all',searchQuery='',searchTimeout=null,currentProductId=null,modalOpen=false,displayedCount=0,currentFilteredProducts=[],observer=null;

            function saveFavorites(){localStorage.setItem('nrj_favorites',JSON.stringify(favorites));}
            async function fetchProducts(){const{data,error}=await supabaseClient.from('products').select('*').order('id',{ascending:true});if(error){products=[];}else{products=data;}}
            async function insertProduct(p){/* ... */ async function deleteProductFromSupabase(id){/* ... */}

            // Filtrage et recherche
            function getFilteredProducts(){
                let filtered = currentFilter === 'favorites'
                    ? products.filter(p => favorites.includes(p.id))
                    : (currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter));
                if (searchQuery && !(/^\d+$/.test(searchQuery) && products.some(p => p.id === parseInt(searchQuery)))){
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || (p.category && p.category.toLowerCase().includes(q)));
                }
                return filtered;
            }

            function renderInitialProducts(){
                currentFilteredProducts = getFilteredProducts();
                displayedCount = 0;
                const grid = document.getElementById('productsGrid');
                grid.innerHTML = '';
                if (currentFilteredProducts.length === 0) {
                    grid.innerHTML = '<div class="empty-fav" style="color:#666;text-align:center;padding:3rem;">Aucun produit trouvé</div>';
                    document.getElementById('loadMoreSentinel').style.display = 'none';
                    document.getElementById('loadingMessage').style.display = 'none';
                    return;
                }
                appendProducts(0, PRODUCTS_PER_PAGE);
                updateSentinelVisibility();
            }

            function appendProducts(start, count){
                const grid = document.getElementById('productsGrid');
                const slice = currentFilteredProducts.slice(start, start + count);
                slice.forEach(p => {
                    const firstImage = p.image || '';
                    const imgContent = firstImage ? `<img src="${escapeHtml(firstImage)}" alt="" loading="lazy" onerror="this.style.display='none';">` : '';
                    const isFav = favorites.includes(p.id);
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.dataset.productId = p.id;
                    card.innerHTML = `
                        ${imgContent}
                        <div class="product-card-info">
                            <div class="product-card-text">
                                <div class="product-card-name">${escapeHtml(p.name)}</div>
                                <div class="product-card-price">${formatPrice(p.price)}</div>
                            </div>
                        </div>
                        <button class="product-card-add" data-action="add-to-cart" data-id="${p.id}">+</button>
                        <button class="fav-icon" data-action="toggle-favorite" data-id="${p.id}">${isFav?'❤️':'🤍'}</button>
                    `;
                    grid.appendChild(card);
                });
                displayedCount += slice.length;
                document.getElementById('loadingMessage').style.display = 'none';
                updateSentinelVisibility();
            }

            function loadMoreProducts(){
                if (displayedCount >= currentFilteredProducts.length) return;
                document.getElementById('loadingMessage').style.display = 'block';
                setTimeout(() => {
                    appendProducts(displayedCount, PRODUCTS_PER_PAGE);
                }, 100);
            }

            function updateSentinelVisibility(){
                const sentinel = document.getElementById('loadMoreSentinel');
                if (displayedCount >= currentFilteredProducts.length) {
                    sentinel.style.display = 'none';
                } else {
                    sentinel.style.display = 'block';
                }
            }

            function setupObserver(){
                if (observer) observer.disconnect();
                const sentinel = document.getElementById('loadMoreSentinel');
                if (!sentinel) return;
                observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting && displayedCount < currentFilteredProducts.length) {
                            loadMoreProducts();
                        }
                    });
                }, { rootMargin: '200px' });
                observer.observe(sentinel);
            }

            function refreshCatalogue(){
                renderInitialProducts();
                setupObserver();
            }

            function applyFilter(category){
                currentFilter = category;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                const activeBtn = document.querySelector(`.filter-btn[data-category="${category}"]`);
                if (activeBtn) activeBtn.classList.add('active');
                refreshCatalogue();
            }

            document.getElementById('searchInput').addEventListener('input', function(e){
                const v = e.target.value.trim();
                searchQuery = v;
                clearTimeout(searchTimeout);
                if (v && /^\d+$/.test(v) && products.some(p => p.id === parseInt(v))){
                    searchTimeout = setTimeout(() => {
                        const id = parseInt(v);
                        openProductModal(id);
                        e.target.value = '';
                        searchQuery = '';
                        refreshCatalogue();
                    }, 600);
                    return;
                }
                refreshCatalogue();
            });

            document.addEventListener('click', e => {
                const fb = e.target.closest('.filter-btn');
                if (fb) {
                    const category = fb.dataset.category;
                    applyFilter(category);
                }
                if (e.target.matches('[data-action="add-to-cart"]')) {
                    e.stopPropagation();
                    addToCart(parseInt(e.target.dataset.id));
                }
                if (e.target.matches('[data-action="toggle-favorite"]')) {
                    e.stopPropagation();
                    toggleFavorite(parseInt(e.target.dataset.id));
                }
                const card = e.target.closest('.product-card');
                if (card && !e.target.closest('.product-card-add') && !e.target.closest('.fav-icon')) {
                    const id = parseInt(card.dataset.productId);
                    openProductModal(id);
                }
            });

            function addToCart(pid,t='',c=''){
                const p=products.find(pr=>pr.id===pid);if(!p)return;
                const moq=Number(p.moq)||1;
                const exist=cart.find(i=>i.productId===pid&&i.taille===t&&i.couleur===c);
                if(exist)exist.quantity=Number(exist.quantity)+moq;
                else cart.push({productId:pid,quantity:moq,taille:t,couleur:c,moq});
                saveCart();refreshCartDisplay();showToast('🛒 Ajouté au panier');
            }
            function changeQty(idx,d){ /* ... */ }
            function removeCartItem(idx){ /* ... */ }
            function saveCart(){localStorage.setItem('nrj_cart_v31',JSON.stringify(cart));}
            function refreshCartDisplay(){ /* ... */ }

            function toggleFavorite(pid){
                const idx = favorites.indexOf(pid);
                if (idx > -1) favorites.splice(idx,1);
                else favorites.push(pid);
                saveFavorites();
                document.querySelectorAll(`.fav-icon[data-id="${pid}"]`).forEach(icon => {
                    icon.textContent = favorites.includes(pid) ? '❤️' : '🤍';
                });
                const modalFav = document.getElementById('modalFavBtn');
                if (modalFav && currentProductId === pid) {
                    modalFav.textContent = favorites.includes(pid) ? '❤️' : '🤍';
                }
            }

            // Modale produit
            function openProductModal(pid, t=null, c=null){
                const p=products.find(pr=>pr.id===pid);if(!p)return;
                currentProductId=pid;
                const tailles=(p.tailles||'').split(',').map(s=>s.trim()).filter(Boolean),
                      couleurs=(p.couleurs||'').split(',').map(s=>s.trim()).filter(Boolean);
                let sT=tailles.length?(t&&tailles.includes(t)?t:tailles[0]):'',
                    sC=couleurs.length?(c&&couleurs.includes(c)?c:couleurs[0]):'';
                const moq=Number(p.moq)||1, uPrice=Number(p.price), tMin=uPrice*moq;

                document.getElementById('modalPrice').textContent=formatPrice(uPrice);
                document.getElementById('modalMoq').textContent=`Minimum d'achat : ${moq} pièce(s)`;
                document.getElementById('modalTotal').textContent=`Total minimum : ${formatPrice(tMin)}`;
                document.getElementById('modalDesc').textContent=p.description||'';
                document.getElementById('modalProductIdBadge').textContent=`[ID: ${p.id}]`;
                document.getElementById('modalFavBtn').textContent=favorites.includes(p.id)?'❤️':'🤍';
                document.getElementById('modalFavBtn').onclick=()=>toggleFavorite(p.id);
                document.getElementById('modalShareBtn').onclick=()=>{
                    const url=BASE_URL+'?id='+p.id;
                    const txt=`${formatPrice(uPrice)}\nMinimum d'achat : ${moq} pièce(s)\nTotal minimum : ${formatPrice(tMin)}\nDécouvre "${p.name}" sur NRJ Marketplace International ${url}`;
                    if(navigator.share)navigator.share({title:p.name,text:txt,url}).catch(()=>{});
                    else navigator.clipboard.writeText(txt).then(()=>showToast('🔗 Copié !'));
                };

                const imgs=[p.image,p.image2,p.image3,p.image4,p.image5,p.image6].filter(u=>u&&u.trim());
                const sc=document.getElementById('modalCarouselScroll'), dc=document.getElementById('modalCarouselDots');
                sc.innerHTML=''; dc.innerHTML='';
                if(imgs.length===0){
                    sc.innerHTML='<div class="carousel-slide"><div class="carousel-emoji-slide">📦</div></div>';
                    dc.innerHTML='<button class="carousel-dot active"></button>';
                }else{
                    imgs.forEach((u,i)=>{
                        sc.innerHTML+=`<div class="carousel-slide"><img src="${escapeHtml(u)}" onerror="this.style.display='none';"></div>`;
                        dc.innerHTML+=`<button class="carousel-dot${i===0?' active':''}" data-index="${i}"></button>`;
                    });
                }

                function ro(ct,opts,sel,ty){ct.innerHTML='';opts.forEach(o=>{const b=document.createElement('button');b.className='option-btn'+(o===sel?' selected':'');b.textContent=o;b.onclick=()=>{ct.querySelectorAll('.option-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');if(ty==='taille')sT=o;else sC=o;};ct.appendChild(b);});}
                if(tailles.length){document.getElementById('modalTailleGroup').style.display='block';ro(document.getElementById('modalTailleOptions'),tailles,sT,'taille');}else document.getElementById('modalTailleGroup').style.display='none';
                if(couleurs.length){document.getElementById('modalCouleurGroup').style.display='block';ro(document.getElementById('modalCouleurOptions'),couleurs,sC,'couleur');}else document.getElementById('modalCouleurGroup').style.display='none';

                document.getElementById('addToCartStickyBtn').onclick=()=>addToCart(p.id,sT,sC);
                document.getElementById('directOrderStickyBtn').onclick=()=>{
                    if(tailles.length&&!sT)return showToast('⚠️ Sélectionnez une taille');
                    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(`Bonjour NRJ Marketplace, je souhaite commander directement ce produit : ${p.name} (ID: ${p.id}), Taille: ${sT||'N/A'}, Quantité: ${moq}, Total minimum: ${formatPrice(tMin)}. Voici le lien : ${BASE_URL}?id=${p.id}`)}`,'_blank');
                };

                let rec=products.filter(pr=>pr.category===p.category&&pr.id!==p.id);
                if(rec.length<6)rec=[...rec,...products.filter(pr=>pr.id!==p.id&&!rec.includes(pr))].slice(0,6);
                document.getElementById('modalRecCarousel').innerHTML=rec.map(r=>`<div class="rec-card" data-product-id="${r.id}"><img src="${escapeHtml(r.image||'')}" onerror="this.style.display='none';"><div class="rec-card-overlay"><div><div class="rec-card-name">${escapeHtml(r.name)}</div><div class="rec-card-price">${formatPrice(r.price)}</div></div></div></div>`).join('');

                document.getElementById('productModal').classList.add('open');
                document.getElementById('stickyBottomBar').classList.add('visible');
                if(!modalOpen){
                    history.pushState({modalOpen:true}, '', `?id=${p.id}`);
                    modalOpen=true;
                }
            }

            function closeProductModal(){
                document.getElementById('productModal').classList.remove('open');
                document.getElementById('stickyBottomBar').classList.remove('visible');
                if(modalOpen){
                    history.back();
                }
            }

            window.addEventListener('popstate', function(e){
                if(modalOpen){
                    document.getElementById('productModal').classList.remove('open');
                    document.getElementById('stickyBottomBar').classList.remove('visible');
                    modalOpen=false;
                }
            });

            document.getElementById('modalCloseBtn').addEventListener('click', closeProductModal);

            // Sourcing modal
            document.getElementById('modalSourcingBtn').addEventListener('click',()=>document.getElementById('modalSourcingFileInput').click());
            document.getElementById('modalSourcingFileInput').addEventListener('change',async(e)=>{
                const f=e.target.files[0];if(!f)return;
                document.getElementById('modalSourcingStatus').textContent='⏳ Téléversement...';
                try{
                    const fd=new FormData();fd.append('upload',f);
                    const r=await fetch('https://postimages.org/json',{method:'POST',body:fd});
                    const d=await r.json();
                    const url=d.url||d.direct_link;
                    document.getElementById('modalSourcingStatus').textContent='✅ Redirection WhatsApp...';
                    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(`Bonjour NRJ Marketplace, je recherche un produit similaire à cette photo : ${url}`)}`,'_blank');
                    document.getElementById('modalSourcingStatus').textContent='';
                }catch(er){document.getElementById('modalSourcingStatus').textContent='❌ Échec';}
                e.target.value='';
            });
            document.getElementById('modalDescSourcingBtn').addEventListener('click',()=>{
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent("Bonjour NRJ Marketplace International, je recherche un produit spécifique mais je n'ai pas de photo sous la main. J'aimerais vous décrire ce que je cherche pour que vous puissiez vérifier auprès de vos fournisseurs !")}`,'_blank');
            });

            // Initialisation
            async function init(){
                await fetchProducts();
                const cats = [...new Set(products.map(p => removeEmojis(p.category)))];
                let filterHTML = '<button class="filter-btn active" data-category="all">Tout voir</button>';
                filterHTML += '<button class="filter-btn fav-btn" data-category="favorites">❤️ Favoris</button>';
                cats.forEach(c => filterHTML += `<button class="filter-btn" data-category="${escapeHtml(c)}">${escapeHtml(c)}</button>`);
                document.getElementById('filterBar').innerHTML = filterHTML;

                refreshCatalogue();
                refreshCartDisplay();

                const { data: { session } } = await supabaseClient.auth.getSession();
                if(session){
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('logoutBtn').classList.add('visible');
                    renderAdminList();
                }

                const urlP = new URLSearchParams(window.location.search).get('id');
                if(urlP){
                    const p = products.find(pr => pr.id === parseInt(urlP));
                    if(p) openProductModal(parseInt(urlP));
                }
            }
            init();
        })();
    </script>
</body>
</html>
